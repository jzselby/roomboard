<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#14171a">
<title>Meal Scale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=JetBrains+Mono:wght@400;700&family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f2f3f0; --ink:#14171a; --muted:#6b736c;
    --lcd:#c3cabe; --lcd-deep:#aab3a4;
    --accent:#1f3fcc; --flag:#a86a0d; --line:#d3d6d0;
    --display:"Bricolage Grotesque",system-ui,sans-serif;
    --body:"Public Sans",system-ui,sans-serif;
    --data:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--body);
    font-size:16px;line-height:1.45;
    padding:0 18px calc(28px + env(safe-area-inset-bottom));
    max-width:560px;margin:0 auto;
  }
  header{display:flex;align-items:baseline;justify-content:space-between;
    padding:22px 0 18px}
  .wordmark{font-family:var(--display);font-weight:800;font-size:19px;
    letter-spacing:-.02em}
  .wordmark span{color:var(--muted);font-weight:600}
  .link{background:none;border:0;font-family:var(--body);font-size:13px;
    color:var(--muted);text-decoration:underline;text-underline-offset:3px;
    padding:4px;cursor:pointer}

  /* signature: the readout */
  .readout{background:var(--lcd);border:1px solid var(--lcd-deep);
    border-radius:3px;padding:20px 18px 14px;position:relative;overflow:hidden}
  .readout::after{content:"";position:absolute;inset:0;
    background:linear-gradient(160deg,rgba(255,255,255,.5),transparent 42%);
    pointer-events:none}
  .digits{position:relative;font-family:var(--data);font-weight:700;
    font-size:clamp(52px,17vw,76px);line-height:.92;letter-spacing:-.04em;
    font-variant-numeric:tabular-nums}
  .ghost{position:absolute;inset:0;color:var(--lcd-deep);opacity:.55}
  .live{position:relative}
  .readout-foot{display:flex;justify-content:space-between;align-items:flex-end;
    margin-top:10px;font-family:var(--data);font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;color:#4d554e}

  .bars{display:flex;gap:3px;align-items:flex-end;height:34px;margin-top:16px}
  .bars i{flex:1;background:var(--lcd-deep);border-radius:1px;min-height:2px;
    display:block}
  .bars i.today{background:var(--ink)}

  .capture{display:block;width:100%;margin:20px 0 8px;padding:20px;
    background:var(--ink);color:var(--paper);border:0;border-radius:3px;
    font-family:var(--display);font-weight:700;font-size:18px;
    letter-spacing:-.01em;cursor:pointer}
  .capture:disabled{background:var(--muted)}
  .capture:active{transform:translateY(1px)}
  input[type=file]{display:none}

  .status{font-family:var(--data);font-size:12px;color:var(--muted);
    text-align:center;padding:8px 0;letter-spacing:.04em}
  .status.bad{color:#992d1a}

  .item{border-top:1px solid var(--line);padding:16px 0}
  .item-head{display:flex;justify-content:space-between;gap:12px;
    align-items:baseline}
  .item-name{font-family:var(--display);font-weight:600;font-size:17px;
    letter-spacing:-.01em}
  .item-kcal{font-family:var(--data);font-weight:700;font-size:17px;
    font-variant-numeric:tabular-nums;white-space:nowrap}
  .chip{display:inline-block;font-family:var(--data);font-size:10px;
    letter-spacing:.12em;text-transform:uppercase;padding:2px 6px;
    border:1px solid currentColor;border-radius:2px;color:var(--muted);
    margin-top:6px}
  .chip.low{color:var(--flag)}
  .note{font-size:13px;color:var(--muted);margin-top:6px}
  .grams{display:flex;align-items:center;gap:12px;margin-top:12px}
  .grams output{font-family:var(--data);font-size:13px;min-width:64px;
    text-align:right;font-variant-numeric:tabular-nums}
  input[type=range]{flex:1;accent-color:var(--accent);height:26px}

  .macros{display:flex;gap:18px;font-family:var(--data);font-size:11px;
    color:var(--muted);margin-top:14px;letter-spacing:.06em;
    text-transform:uppercase;border-top:1px solid var(--line);padding-top:12px}
  .macros b{color:var(--ink);font-weight:700}

  .row{display:flex;gap:10px;margin-top:18px}
  .btn{flex:1;padding:15px;border-radius:3px;font-family:var(--body);
    font-weight:700;font-size:15px;cursor:pointer;border:1px solid var(--ink)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.ghost{background:transparent;color:var(--ink)}

  label.field{display:block;margin-top:16px;font-family:var(--data);
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted)}
  .field input{width:100%;margin-top:6px;padding:12px;border:1px solid var(--line);
    border-radius:3px;font-family:var(--data);font-size:13px;background:#fff;
    color:var(--ink)}
  .help{font-size:13px;color:var(--muted);margin-top:14px}
  img.shot{width:100%;border-radius:3px;margin-top:18px;display:block}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* localStorage is wrapped because some preview sandboxes block it.
   On GitHub Pages it works normally and remembers your endpoint. */
const store = {
  get(k){ try { return localStorage.getItem(k) || ''; } catch(e){ return ''; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
};

const kcal = it => Math.round(it.grams * it.kcal_per_100g / 100);
const macro = (it,f) => it.grams * it[f] / 100;

/* Downscale before upload — a raw phone photo is 4MB and slow on cell data. */
function shrink(file){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = () => {
      const max = 1024, s = Math.min(1, max/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      const url = c.toDataURL('image/jpeg',0.8);
      res({ dataUrl:url, base64:url.split(',')[1] });
    };
    img.onerror = () => rej(new Error('Could not read that image'));
    img.src = URL.createObjectURL(file);
  });
}

/* text/plain keeps this a "simple" request, so the browser skips the
   preflight that Apps Script can't answer. */
async function call(endpoint, payload){
  const r = await fetch(endpoint, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return r.json();
}

function Readout({ today, history }){
  const digits = String(today).padStart(4,'0');
  const max = Math.max(2000, ...history.map(d=>d.calories));
  const bars = history.slice(-14);
  return (
    <div className="readout">
      <div className="digits">
        <span className="ghost" aria-hidden="true">8888</span>
        <span className="live">{digits}</span>
      </div>
      <div className="readout-foot">
        <span>kcal today</span>
        <span>{bars.length} day log</span>
      </div>
      {bars.length > 1 &&
        <div className="bars" aria-hidden="true">
          {bars.map((d,i)=>
            <i key={d.date}
               className={i===bars.length-1?'today':''}
               style={{height:Math.max(2,(d.calories/max)*34)+'px'}} />)}
        </div>}
    </div>
  );
}

function Item({ it, onGrams }){
  return (
    <div className="item">
      <div className="item-head">
        <div>
          <div className="item-name">{it.name}</div>
          <span className={'chip ' + (it.confidence==='low'?'low':'')}>
            {it.confidence} confidence
          </span>
        </div>
        <div className="item-kcal">{kcal(it)}</div>
      </div>
      {it.note && <div className="note">{it.note}</div>}
      <div className="grams">
        <input type="range" min="10" max="600" step="5" value={it.grams}
               aria-label={'Grams of ' + it.name}
               onChange={e=>onGrams(Number(e.target.value))} />
        <output>{it.grams} g</output>
      </div>
    </div>
  );
}

function App(){
  const [endpoint,setEndpoint] = useState(()=>store.get('endpoint'));
  const [token,setToken]       = useState(()=>store.get('token'));
  const [setup,setSetup]       = useState(!store.get('endpoint'));
  const [items,setItems]       = useState(null);
  const [meal,setMeal]         = useState('');
  const [shot,setShot]         = useState('');
  const [status,setStatus]     = useState('');
  const [busy,setBusy]         = useState(false);
  const [today,setToday]       = useState(0);
  const [history,setHistory]   = useState([]);
  const file = useRef(null);

  const configured = endpoint && token;

  useEffect(()=>{ if(configured && !setup) refresh(); },[setup]);

  async function refresh(){
    try{
      const r = await call(endpoint,{token,action:'history',days:14});
      if(r.days){
        setHistory(r.days);
        const t = new Date().toISOString().slice(0,10);
        const d = r.days.find(x=>x.date===t);
        setToday(d ? d.calories : 0);
      }
    }catch(e){ /* offline is fine, the readout just stays at zero */ }
  }

  async function onFile(e){
    const f = e.target.files[0];
    if(!f) return;
    setBusy(true); setStatus('Reading the photo'); setItems(null);
    try{
      const img = await shrink(f);
      setShot(img.dataUrl);
      setStatus('Estimating portions');
      const r = await call(endpoint,{token,image:img.base64,mimeType:'image/jpeg'});
      if(r.error){ setStatus(r.error); setBusy(false); e.target.value=''; return; }
      setItems(r.items.map(i=>({...i, grams:Math.round(i.grams)})));
      setMeal(r.meal || '');
      setStatus('');
    }catch(err){
      setStatus('That request did not go through. Check the endpoint URL.');
    }
    setBusy(false);
    e.target.value = '';
  }

  async function save(){
    setBusy(true); setStatus('Saving');
    const r = await call(endpoint,{token,action:'log',items,meal});
    if(r.error){ setStatus(r.error); setBusy(false); return; }
    setItems(null); setShot(''); setStatus('Logged'); setBusy(false);
    refresh();
    setTimeout(()=>setStatus(''),1800);
  }

  const total = items ? items.reduce((s,i)=>s+kcal(i),0) : 0;
  const sum = f => items ? Math.round(items.reduce((s,i)=>s+macro(i,f),0)) : 0;

  if(setup) return (
    <div>
      <header><div className="wordmark">Meal<span>Scale</span></div></header>
      <p className="help">
        Paste the web app URL from your Apps Script deployment and the shared
        secret you set in Script Properties. Both stay on this device.
      </p>
      <label className="field">Web app URL
        <input value={endpoint} onChange={e=>setEndpoint(e.target.value.trim())}
               placeholder="https://script.google.com/macros/s/.../exec" />
      </label>
      <label className="field">Shared secret
        <input value={token} onChange={e=>setToken(e.target.value.trim())} />
      </label>
      <div className="row">
        <button className="btn primary" disabled={!configured}
          onClick={()=>{ store.set('endpoint',endpoint); store.set('token',token);
                         setSetup(false); }}>
          Save settings
        </button>
      </div>
    </div>
  );

  return (
    <div>
      <header>
        <div className="wordmark">Meal<span>Scale</span></div>
        <button className="link" onClick={()=>setSetup(true)}>Settings</button>
      </header>

      <Readout today={today + total} history={history} />

      {!items &&
        <button className="capture" disabled={busy}
                onClick={()=>file.current.click()}>
          {busy ? 'Working' : 'Photograph a meal'}
        </button>}
      <input ref={file} type="file" accept="image/*" capture="environment"
             onChange={onFile} />

      {status && <div className={'status ' + (busy?'':'bad')}>{status}</div>}
      {shot && !items && busy && <img className="shot" src={shot} alt="" />}

      {items && (
        <div>
          {items.map((it,idx)=>
            <Item key={idx} it={it} onGrams={g=>setItems(items.map((x,j)=>
              j===idx ? {...x, grams:g} : x))} />)}

          <div className="macros">
            <span>protein <b>{sum('protein_per_100g')}g</b></span>
            <span>carbs <b>{sum('carbs_per_100g')}g</b></span>
            <span>fat <b>{sum('fat_per_100g')}g</b></span>
          </div>

          <div className="row">
            <button className="btn ghost"
                    onClick={()=>{setItems(null);setShot('');}}>Discard</button>
            <button className="btn primary" disabled={busy} onClick={save}>
              Log {total} kcal
            </button>
          </div>
          {shot && <img className="shot" src={shot} alt="The meal you photographed" />}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
