name: Sofa Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Restore seen sofas
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-sofas

      - name: Check clearance sofas
        run: node monitor.js --once
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '465'
          SMTP_SECURE: 'true'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TZ: America/Chicago

      - name: Save seen sofas
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen.json
          key: seen-sofas
